# Reusable workflow: sync PR reactions into Sift DB after close/merge (GitHub Actions path).
# Client repos add a workflow on pull_request (types: [closed]) that calls this.
# Reactions are read via GitHub API; default auth uses the caller's ${{ github.token }}.
name: Sift Feedback

on:
  workflow_call:
    inputs:
      repository:
        description: "Repository full name (owner/repo)"
        required: true
        type: string
      pr_number:
        description: "Pull request number"
        required: true
        type: number
      merged:
        description: "Whether the PR was merged (github.event.pull_request.merged)"
        required: true
        type: boolean
      auth_mode:
        description: "Auth for GitHub API: github_token or installation_id"
        required: false
        type: string
        default: "github_token"
    secrets:
      SIFT_IMAGE:
        required: true
        description: "Container image (e.g. ghcr.io/owner/sift:latest)"
      SIFT_DATABASE_URL:
        required: true
        description: "PostgreSQL connection string for the container"
      SIFT_API_KEY:
        required: false
        description: "Bearer token for POST /feedback (optional)"
      SIFT_LLM_MODEL:
        required: false
        description: "LLM model string (e.g. ollama/llama3.2)"
      SIFT_LLM_API_KEY:
        required: false
        description: "LLM provider API key (e.g. OPENAI_API_KEY value)"
      SIFT_LLM_API_BASE:
        required: false
        description: "LiteLLM chat API base URL (often required for ollama/...; also Azure OpenAI, self-hosted OpenAI-compatible APIs)"
      SIFT_INSTALLATION_ID:
        required: false
        description: "GitHub App installation ID (for installation_id auth)"
      GITHUB_WEBHOOK_SECRET:
        required: false
        description: "GitHub webhook secret (optional, for webhook flows)"
      SIFT_GITHUB_TOKEN:
        required: false
        description: "GitHub PAT for API when auth_mode is github_token and not using GITHUB_TOKEN secret passthrough"
      SWIFT_API_BACKEND_BASE_URL:
        required: false
        description: "Optional override for SWIFT_API_BACKEND_BASE_URL (image default is used when omitted)"
      SIFT_EMBEDDING_MODEL:
        required: false
        description: "Embedding model string (e.g. ollama/nomic-embed-text)"
      SIFT_EMBEDDING_API_BASE:
        required: false
        description: "Embedding provider API base (e.g. Ollama URL); omit for OpenAI/Gemini defaults"
      SIFT_EMBEDDING_DIMENSION:
        required: false
        description: "Vector dimension for the HNSW index (must match model output)"
      SIFT_SEMGREP_ENABLED:
        required: false
        description: "SEMGREP_ENABLED — 1/true/yes to run Semgrep (default 1 if unset)"
      SIFT_CODEQL_ENABLED:
        required: false
        description: "CODEQL_ENABLED — 1/true/yes to run CodeQL (default 0 if unset)"
      SIFT_VECTOR_DB_ENABLED:
        required: false
        description: "VECTOR_DB_ENABLED — 1/true/yes for code similarity (default 0 if unset)"
      SIFT_SMART_ROUTING_ENABLED:
        required: false
        description: "SIFT_SMART_ROUTING_ENABLED — 1/true/yes for smart routing (default 1 if unset)"

jobs:
  feedback:
    runs-on: ubuntu-latest
    steps:
      - name: Start Sift container
        env:
          SIFT_IMAGE: ${{ secrets.SIFT_IMAGE }}
          SIFT_DATABASE_URL: ${{ secrets.SIFT_DATABASE_URL }}
          SIFT_API_KEY: ${{ secrets.SIFT_API_KEY }}
          SIFT_LLM_MODEL: ${{ secrets.SIFT_LLM_MODEL }}
          SIFT_LLM_API_KEY: ${{ secrets.SIFT_LLM_API_KEY }}
          SIFT_LLM_API_BASE: ${{ secrets.SIFT_LLM_API_BASE }}
          SIFT_GITHUB_WEBHOOK_SECRET: ${{ secrets.GITHUB_WEBHOOK_SECRET }}
          SWIFT_API_BACKEND_BASE_URL: ${{ secrets.SWIFT_API_BACKEND_BASE_URL }}
          SIFT_EMBEDDING_MODEL: ${{ secrets.SIFT_EMBEDDING_MODEL }}
          SIFT_EMBEDDING_API_BASE: ${{ secrets.SIFT_EMBEDDING_API_BASE }}
          SIFT_EMBEDDING_DIMENSION: ${{ secrets.SIFT_EMBEDDING_DIMENSION }}
          SIFT_SEMGREP_ENABLED: ${{ secrets.SIFT_SEMGREP_ENABLED }}
          SIFT_CODEQL_ENABLED: ${{ secrets.SIFT_CODEQL_ENABLED }}
          SIFT_VECTOR_DB_ENABLED: ${{ secrets.SIFT_VECTOR_DB_ENABLED }}
          SIFT_SMART_ROUTING_ENABLED: ${{ secrets.SIFT_SMART_ROUTING_ENABLED }}
        run: |
          set -eo pipefail
          echo "::group::Feedback start diagnostics"
          echo "repository=${{ inputs.repository }}"
          echo "pr_number=${{ inputs.pr_number }}"
          echo "merged=${{ inputs.merged }}"
          echo "auth_mode=${{ inputs.auth_mode }}"
          echo "SIFT_API_KEY set: $([ -n "${SIFT_API_KEY:-}" ] && echo yes || echo no)"
          echo "SIFT_LLM_MODEL set: $([ -n "${SIFT_LLM_MODEL:-}" ] && echo yes || echo no)"
          echo "SIFT_LLM_API_BASE set: $([ -n "${SIFT_LLM_API_BASE:-}" ] && echo yes || echo no)"
          echo "SIFT_LLM_API_KEY length: ${#SIFT_LLM_API_KEY}"
          echo "SIFT_EMBEDDING_MODEL set: $([ -n "${SIFT_EMBEDDING_MODEL:-}" ] && echo yes || echo no)"
          echo "SIFT_EMBEDDING_API_BASE set: $([ -n "${SIFT_EMBEDDING_API_BASE:-}" ] && echo yes || echo no)"
          echo "SIFT_EMBEDDING_DIMENSION=${SIFT_EMBEDDING_DIMENSION:-<unset>}"
          echo "SIFT_SEMGREP_ENABLED=${SIFT_SEMGREP_ENABLED:-1}"
          echo "SIFT_CODEQL_ENABLED=${SIFT_CODEQL_ENABLED:-0}"
          echo "SIFT_VECTOR_DB_ENABLED=${SIFT_VECTOR_DB_ENABLED:-0}"
          echo "SIFT_SMART_ROUTING_ENABLED=${SIFT_SMART_ROUTING_ENABLED:-1}"
          echo "SWIFT_API_BACKEND_BASE_URL set: $([ -n "${SWIFT_API_BACKEND_BASE_URL:-}" ] && echo yes || echo no)"
          echo "::endgroup::"
          IMAGE=$(printf '%s' "$SIFT_IMAGE" | tr -d '\n\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "$IMAGE" ]; then
            echo "❌ SIFT_IMAGE secret is required and must be non-empty"
            echo "::error::SIFT_IMAGE secret is required and must be non-empty"
            exit 1
          fi
          echo "✅ Normalized image: $IMAGE"
          SWIFT_ENV_ARGS=()
          if [ -n "${SWIFT_API_BACKEND_BASE_URL:-}" ]; then
            SWIFT_ENV_ARGS=(-e "SWIFT_API_BACKEND_BASE_URL=$SWIFT_API_BACKEND_BASE_URL")
          fi
          echo "Starting docker pull for image: $IMAGE"
          docker pull "$IMAGE"
          echo "✅ docker pull completed"
          echo "Starting docker run for sift container"
          docker run -d --name sift -p 8000:8000 \
            -e DATABASE_URL="$SIFT_DATABASE_URL" \
            -e SIFT_API_KEY="$SIFT_API_KEY" \
            -e LLM_MODEL="${SIFT_LLM_MODEL:-ollama/llama3.2}" \
            -e OPENAI_API_KEY="$SIFT_LLM_API_KEY" \
            -e GEMINI_API_KEY="$SIFT_LLM_API_KEY" \
            -e ANTHROPIC_API_KEY="$SIFT_LLM_API_KEY" \
            -e LLM_API_BASE="${SIFT_LLM_API_BASE}" \
            -e GITHUB_WEBHOOK_SECRET="$SIFT_GITHUB_WEBHOOK_SECRET" \
            -e EMBEDDING_MODEL="${SIFT_EMBEDDING_MODEL}" \
            -e EMBEDDING_API_BASE="${SIFT_EMBEDDING_API_BASE}" \
            -e EMBEDDING_DIMENSION="${SIFT_EMBEDDING_DIMENSION}" \
            -e SEMGREP_ENABLED="${SIFT_SEMGREP_ENABLED:-1}" \
            -e CODEQL_ENABLED="${SIFT_CODEQL_ENABLED:-0}" \
            -e VECTOR_DB_ENABLED="${SIFT_VECTOR_DB_ENABLED:-0}" \
            -e SIFT_SMART_ROUTING_ENABLED="${SIFT_SMART_ROUTING_ENABLED:-1}" \
            "${SWIFT_ENV_ARGS[@]}" \
            "$IMAGE"
          echo "✅ docker run completed"
          echo "::group::Container startup snapshot"
          docker ps --filter "name=sift"
          docker logs --tail 40 sift 2>&1 || true
          echo "::endgroup::"

      - name: Health check
        run: |
          echo "Starting health checks against http://localhost:8000/health"
          for i in $(seq 1 30); do
            echo "Health check attempt ${i}/30"
            if curl -sf http://localhost:8000/health | jq -e '.status == "ok"' >/dev/null 2>&1; then
              echo "✅ Health check passed on attempt ${i}/30"
              exit 0
            fi
            echo "Waiting for Sift... ($i/30)"
            sleep 2
          done
          echo "❌ Health check timed out after 30 attempts"
          echo "::group::Health check failure diagnostics"
          docker ps --filter "name=sift"
          docker logs --tail 80 sift 2>&1 || true
          echo "::endgroup::"
          exit 1

      - name: Trigger feedback sync
        env:
          INPUT_REPOSITORY: ${{ inputs.repository }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_MERGED: ${{ inputs.merged }}
          AUTH_MODE: ${{ inputs.auth_mode }}
          SIFT_API_KEY: ${{ secrets.SIFT_API_KEY }}
          SIFT_GITHUB_TOKEN: ${{ secrets.SIFT_GITHUB_TOKEN }}
          SIFT_INSTALLATION_ID: ${{ secrets.SIFT_INSTALLATION_ID }}
          GITHUB_TOKEN_DEFAULT: ${{ github.token }}
        run: |
          set -eo pipefail
          OWNER="${INPUT_REPOSITORY%%/*}"
          REPO="${INPUT_REPOSITORY#*/}"
          AUTH_HEADER=""
          if [ -n "${SIFT_API_KEY:-}" ]; then
            AUTH_HEADER="Authorization: Bearer $SIFT_API_KEY"
          fi

          SIFT_GH="${SIFT_GITHUB_TOKEN:-}"
          GHD="${GITHUB_TOKEN_DEFAULT:-}"
          echo "::group::Feedback sync diagnostics"
          echo "repository=$INPUT_REPOSITORY owner=$OWNER repo=$REPO"
          echo "pr_number=$INPUT_PR_NUMBER merged=$INPUT_MERGED"
          echo "AUTH_MODE=$AUTH_MODE"
          echo "SIFT_API_KEY set: $([ -n "${SIFT_API_KEY:-}" ] && echo yes || echo no)"
          echo "SIFT_INSTALLATION_ID set: $([ -n "${SIFT_INSTALLATION_ID:-}" ] && echo yes || echo no)"
          echo "SIFT_GITHUB_TOKEN length: ${#SIFT_GH}"
          echo "GITHUB_TOKEN_DEFAULT length: ${#GHD}"
          echo "::endgroup::"

          if [ "$AUTH_MODE" = "installation_id" ] && [ -n "${SIFT_INSTALLATION_ID:-}" ]; then
            echo "Using installation_id payload mode"
            BODY=$(jq -n \
              --arg owner "$OWNER" \
              --arg repo "$REPO" \
              --argjson pr_number "$INPUT_PR_NUMBER" \
              --argjson merged "$INPUT_MERGED" \
              --argjson installation_id "$SIFT_INSTALLATION_ID" \
              '{owner: $owner, repo: $repo, pr_number: $pr_number, merged: $merged, installation_id: $installation_id}') \
              || { echo "❌ jq failed building BODY (installation_id). Check merged/pr_number are valid JSON."; echo "::error::jq failed building BODY (installation_id). Check merged/pr_number are valid JSON."; exit 1; }
          else
            echo "Using github_token payload mode"
            GH_TOKEN="${SIFT_GITHUB_TOKEN:-$GITHUB_TOKEN_DEFAULT}"
            if [ -z "$GH_TOKEN" ]; then
              echo "❌ No GitHub token configured"
              echo "::error::No GitHub token: set secrets.SIFT_GITHUB_TOKEN or pass github.token to the workflow"
              exit 1
            fi
            BODY=$(jq -n \
              --arg owner "$OWNER" \
              --arg repo "$REPO" \
              --argjson pr_number "$INPUT_PR_NUMBER" \
              --argjson merged "$INPUT_MERGED" \
              --arg github_token "$GH_TOKEN" \
              '{owner: $owner, repo: $repo, pr_number: $pr_number, merged: $merged, github_token: $github_token}') \
              || { echo "❌ jq failed building BODY (github_token). Check merged/pr_number are valid JSON."; echo "::error::jq failed building BODY (github_token). Check merged/pr_number are valid JSON."; exit 1; }
          fi

          echo "::group::Feedback request (redacted)"
          echo "$BODY" | jq -c '
            if .github_token then .github_token = ("<redacted len=" + ((.github_token | length) | tostring) + ">")
            elif has("installation_id") then .installation_id = "<redacted>"
            else . end
          '
          echo "::endgroup::"

          echo "POST http://localhost:8000/feedback (auth_header_set=$([ -n "$AUTH_HEADER" ] && echo yes || echo no))"
          CURL_EXIT=0
          CURL_RAW=""
          if [ -n "$AUTH_HEADER" ]; then
            CURL_RAW=$(curl -sS -w "\n%{http_code}" \
              -X POST -H "Content-Type: application/json" -H "$AUTH_HEADER" \
              -d "$BODY" http://localhost:8000/feedback) || CURL_EXIT=$?
          else
            CURL_RAW=$(curl -sS -w "\n%{http_code}" \
              -X POST -H "Content-Type: application/json" \
              -d "$BODY" http://localhost:8000/feedback) || CURL_EXIT=$?
          fi
          HTTP_CODE=$(printf '%s' "$CURL_RAW" | tail -n1)
          FEEDBACK_RESP=$(printf '%s' "$CURL_RAW" | sed '$d')

          echo "::group::Feedback response"
          echo "curl exit: $CURL_EXIT"
          echo "HTTP status: ${HTTP_CODE:-<empty>}"
          echo "Response body:"
          echo "$FEEDBACK_RESP"
          echo "::endgroup::"

          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "❌ Feedback request failed: curl exited with code $CURL_EXIT"
            echo "::error::curl failed (exit $CURL_EXIT). Is the container listening on :8000?"
            exit 1
          fi
          case "${HTTP_CODE:-}" in
            2[0-9][0-9])
              echo "✅ Feedback request accepted (HTTP $HTTP_CODE)"
              ;;
            *)
              echo "❌ Feedback request failed (HTTP ${HTTP_CODE:-unknown})"
              echo "::error::POST /feedback failed (HTTP ${HTTP_CODE:-unknown}). See response body and diagnostics above."
              exit 1
              ;;
          esac

      - name: Wait for feedback sync completion
        run: |
          set -eo pipefail
          echo "Waiting up to 300s for feedback sync completion markers"
          if timeout 300 bash -c 'until docker logs sift 2>&1 | grep -qE "Feedback sync completed|Feedback sync skipped|Reaction sync failed"; do sleep 2; done'; then
            echo "✅ Feedback sync completion marker detected"
          else
            echo "❌ Timed out waiting for feedback sync completion markers"
          fi
          echo "::group::Feedback completion log snapshot"
          docker logs --tail 120 sift 2>&1 || true
          echo "::endgroup::"

      - name: Stop container
        if: always()
        run: |
          if docker ps -a --format '{{.Names}}' | grep -qx sift; then
            echo "Stopping container: sift"
            if docker stop sift 2>/dev/null; then
              echo "✅ Container stopped"
            else
              echo "❌ Failed to stop container sift"
            fi
            if docker rm -f sift 2>/dev/null; then
              echo "✅ Container removed"
            else
              echo "❌ Failed to remove container sift"
            fi
          else
            echo "✅ Container sift not present; nothing to clean"
          fi
